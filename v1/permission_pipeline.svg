<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 5 7, 10 0" fill="#2C3E50"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#0000001a"/></filter>
    <linearGradient id="deny" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E74C3C"/><stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F39C12"/><stop offset="100%" stop-color="#E67E22"/>
    </linearGradient>
    <linearGradient id="approve" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27AE60"/><stop offset="100%" stop-color="#229954"/>
    </linearGradient>
  </defs>

  <rect width="680" height="420" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="18" font-weight="bold">v1 权限管道 — 三级纵深防御</text>
  <text x="340" y="50" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="11">permission.py</text>

  <!-- Entry -->
  <rect x="240" y="70" width="200" height="36" rx="6" fill="#34495E" filter="url(#shadow)"/>
  <text x="340" y="93" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13" font-weight="bold">工具调用请求</text>

  <line x1="340" y1="106" x2="340" y2="135" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Level 1 -->
  <rect x="100" y="140" width="480" height="70" rx="8" fill="#FDEDEC" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="140" width="480" height="26" rx="8" fill="url(#deny)"/>
  <rect x="100" y="154" width="480" height="12" fill="url(#deny)"/>
  <text x="340" y="158" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12" font-weight="bold">第 1 级: Deny List · 直接拦截</text>
  <text x="340" y="185" text-anchor="middle" fill="#922B21" font-family="Arial, sans-serif" font-size="11">rm -rf / · sudo · shutdown · reboot</text>
  <text x="340" y="201" text-anchor="middle" fill="#C0392B" font-family="Arial, sans-serif" font-size="9" font-style="italic">命中 → 立即返回错误信息</text>

  <line x1="340" y1="210" x2="340" y2="235" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="355" y="225" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">未命中</text>

  <!-- Level 2 -->
  <rect x="100" y="240" width="480" height="70" rx="8" fill="#FEF5E7" stroke="#F39C12" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="240" width="480" height="26" rx="8" fill="url(#rule)"/>
  <rect x="100" y="254" width="480" height="12" fill="url(#rule)"/>
  <text x="340" y="258" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12" font-weight="bold">第 2 级: Rule Matching · 交互确认</text>
  <text x="340" y="285" text-anchor="middle" fill="#7D6608" font-family="Arial, sans-serif" font-size="11">rm · chmod 777 · &gt; /etc/ · 路径越界</text>
  <text x="340" y="301" text-anchor="middle" fill="#E67E22" font-family="Arial, sans-serif" font-size="9" font-style="italic">命中 → 进入第3级用户确认</text>

  <line x1="340" y1="310" x2="340" y2="335" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="355" y="325" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">未命中</text>

  <!-- Level 3 -->
  <rect x="100" y="340" width="480" height="52" rx="8" fill="#E8F8F5" stroke="#27AE60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="340" width="480" height="26" rx="8" fill="url(#approve)"/>
  <rect x="100" y="354" width="480" height="12" fill="url(#approve)"/>
  <text x="340" y="358" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12" font-weight="bold">第 3 级: User Approval · 手动确认</text>
  <text x="340" y="382" text-anchor="middle" fill="#1E8449" font-family="Arial, sans-serif" font-size="11">交互式 y/n 确认 ✓</text>

  <!-- Theory note -->
  <rect x="60" y="8" width="180" height="20" rx="4" fill="#EBF5FB" stroke="#85C1E9"/>
  <text x="150" y="22" text-anchor="middle" fill="#2E86C1" font-family="Arial, sans-serif" font-size="9" font-weight="bold">理论基础: 纵深防御</text>
  <rect x="540" y="8" width="130" height="20" rx="4" fill="#FDEBD0" stroke="#F0B27A"/>
  <text x="605" y="22" text-anchor="middle" fill="#7E5109" font-family="Arial, sans-serif" font-size="9">局限: 无上下文感知</text>
</svg>
