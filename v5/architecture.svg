<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 650">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980B9"/>
    </marker>
    <filter id="sh"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#00000012"/></filter>
    <linearGradient id="hd"><stop offset="0%" stop-color="#2C3E50"/><stop offset="100%" stop-color="#34495E"/></linearGradient>
    <linearGradient id="mem"><stop offset="0%" stop-color="#16A085"/><stop offset="100%" stop-color="#0E6655"/></linearGradient>
    <linearGradient id="rec"><stop offset="0%" stop-color="#D35400"/><stop offset="100%" stop-color="#A04000"/></linearGradient>
  </defs>

  <rect width="920" height="650" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="920" height="42" fill="url(#hd)" rx="8"/>
  <rect x="0" y="21" width="920" height="21" fill="url(#hd)"/>
  <text x="460" y="27" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="16" font-weight="bold">Agent v5 — 持久记忆 + 错误恢复 (基础完整版本)</text>

  <!-- ===== LEFT: agent_loop ===== -->
  <rect x="12" y="52" width="500" height="588" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1.5"/>
  <text x="28" y="72" fill="#34495E" font-family="Arial" font-size="13" font-weight="bold">agent_loop — 完整流程</text>

  <!-- User input -->
  <rect x="170" y="84" width="160" height="28" rx="5" fill="#34495E" filter="url(#sh)"/>
  <text x="250" y="102" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="11" font-weight="bold">用户输入</text>
  <line x1="250" y1="112" x2="250" y2="136" stroke="#2980B9" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Memory loading -->
  <rect x="100" y="140" width="300" height="42" rx="5" fill="#E8F8F5" stroke="#1ABC9C" filter="url(#sh)"/>
  <text x="250" y="157" text-anchor="middle" fill="#0E6655" font-family="Arial" font-size="10" font-weight="bold">📋 load_memories(messages)</text>
  <text x="250" y="173" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="8">LLM侧查询 → 选择相关记忆 → 注入到用户消息</text>
  <line x1="250" y1="182" x2="250" y2="206" stroke="#2980B9" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Context compression -->
  <rect x="125" y="210" width="250" height="28" rx="5" fill="#EBF5FB" stroke="#85C1E9" filter="url(#sh)"/>
  <text x="250" y="229" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="10" font-weight="bold">上下文压缩 (L3→L1→L2→L0)</text>
  <line x1="250" y1="238" x2="250" y2="262" stroke="#2980B9" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- LLM with recovery -->
  <rect x="80" y="266" width="340" height="105" rx="6" fill="#FEF5E7" stroke="#E67E22" stroke-width="2" filter="url(#sh)"/>
  <text x="250" y="284" text-anchor="middle" fill="#7E5109" font-family="Arial" font-size="10" font-weight="bold">with_retry(fn, state) — LLM调用</text>

  <rect x="100" y="294" width="140" height="28" rx="3" fill="#D5F5E3" stroke="#82E0AA"/>
  <text x="170" y="313" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="9" font-weight="bold">✓ 成功 → 正常处理</text>

  <rect x="260" y="294" width="140" height="65" rx="3" fill="#FDEDEC" stroke="#E74C3C"/>
  <text x="330" y="310" text-anchor="middle" fill="#922B21" font-family="Arial" font-size="9" font-weight="bold">✗ 失败 → RecoveryState:</text>
  <text x="270" y="326" fill="#C0392B" font-family="Arial" font-size="7">Path 1: max_tokens</text>
  <text x="270" y="340" fill="#C0392B" font-family="Arial" font-size="7">Path 2: prompt_too_long</text>
  <text x="270" y="354" fill="#C0392B" font-family="Arial" font-size="7">Path 3: 429/529</text>

  <line x1="250" y1="371" x2="250" y2="395" stroke="#2980B9" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Normal completion -->
  <rect x="100" y="399" width="300" height="28" rx="5" fill="#D5F5E3" stroke="#82E0AA" filter="url(#sh)"/>
  <text x="250" y="418" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="10" font-weight="bold">正常完成 ✓</text>
  <line x1="250" y1="427" x2="250" y2="448" stroke="#2980B9" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Memory extract -->
  <rect x="100" y="452" width="300" height="60" rx="5" fill="#E8F8F5" stroke="#1ABC9C" filter="url(#sh)"/>
  <text x="250" y="469" text-anchor="middle" fill="#0E6655" font-family="Arial" font-size="10" font-weight="bold">📝 extract_memories(pre_compress)</text>
  <text x="250" y="485" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="8">取最近10条对话 → LLM识别新记忆 → 写入.md文件</text>
  <text x="250" y="501" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="8">更新 MEMORY.md 索引</text>
  <line x1="250" y1="512" x2="250" y2="532" stroke="#2980B9" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- consolidate -->
  <rect x="100" y="536" width="300" height="42" rx="5" fill="#FDEBD0" stroke="#F0B27A" filter="url(#sh)"/>
  <text x="250" y="553" text-anchor="middle" fill="#7E5109" font-family="Arial" font-size="10" font-weight="bold">🔄 consolidate_memories() — 满10条时合并去重</text>
  <text x="250" y="569" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="8">LLM识别 重复/过时/矛盾 → 合并输出 → 更新索引</text>

  <!-- ===== RIGHT TOP: Memory System ===== -->
  <rect x="530" y="52" width="376" height="230" rx="6" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="1.5"/>
  <rect x="530" y="52" width="376" height="24" rx="6" fill="url(#mem)"/>
  <rect x="530" y="66" width="376" height="10" fill="url(#mem)"/>
  <text x="718" y="69" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="11" font-weight="bold">memory.py — 持久记忆系统</text>

  <text x="545" y="92" fill="#0E6655" font-family="Arial" font-size="10" font-weight="bold">存储结构 (.memory/):</text>
  <rect x="545" y="100" width="348" height="60" rx="3" fill="#F8F9FA" stroke="#D5D8DC"/>
  <text x="555" y="116" fill="#2C3E50" font-family="Consolas,monospace" font-size="9">MEMORY.md          索引文件 (目录)</text>
  <text x="555" y="132" fill="#2C3E50" font-family="Consolas,monospace" font-size="9">user_pref_*.md     用户偏好 (编码风格/工具选择)</text>
  <text x="555" y="148" fill="#2C3E50" font-family="Consolas,monospace" font-size="9">project_*.md       项目事实 (技术栈/架构决策)</text>

  <text x="545" y="176" fill="#0E6655" font-family="Arial" font-size="10" font-weight="bold">记忆类型:</text>
  <rect x="545" y="184" width="348" height="40" rx="3" fill="#F8F9FA" stroke="#D5D8DC"/>
  <rect x="552" y="190" width="72" height="14" rx="2" fill="#D5F5E3"/>
  <text x="588" y="201" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="8">user</text>
  <rect x="632" y="190" width="72" height="14" rx="2" fill="#FDEBD0"/>
  <text x="668" y="201" text-anchor="middle" fill="#7E5109" font-family="Arial" font-size="8">feedback</text>
  <rect x="712" y="190" width="72" height="14" rx="2" fill="#D4E6F1"/>
  <text x="748" y="201" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="8">project</text>
  <rect x="792" y="190" width="72" height="14" rx="2" fill="#F4ECF7"/>
  <text x="828" y="201" text-anchor="middle" fill="#6C3483" font-family="Arial" font-size="8">reference</text>
  <text x="555" y="216" fill="#7F8C8D" font-family="Arial" font-size="8">每条记忆 .md 文件含 YAML frontmatter: name/description/type + Markdown正文</text>

  <text x="545" y="244" fill="#0E6655" font-family="Arial" font-size="10" font-weight="bold">4个子系统:</text>
  <text x="558" y="262" fill="#2C3E50" font-family="Arial" font-size="9">存储(.memory/) → 加载(LLM侧查询) → 提取(每轮结束) → 合并(满10条)</text>
  <text x="558" y="276" fill="#7F8C8D" font-family="Arial" font-size="8">理论基础: 人类记忆三阶段 — 编码 → 存储 → 检索</text>

  <!-- ===== RIGHT BOTTOM: Recovery System ===== -->
  <rect x="530" y="295" width="376" height="345" rx="6" fill="#FEF5E7" stroke="#E67E22" stroke-width="1.5"/>
  <rect x="530" y="295" width="376" height="24" rx="6" fill="url(#rec)"/>
  <rect x="530" y="309" width="376" height="10" fill="url(#rec)"/>
  <text x="718" y="312" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="11" font-weight="bold">recovery.py — 3条错误恢复路径</text>

  <!-- Path 1 -->
  <rect x="545" y="326" width="348" height="58" rx="4" fill="#FDEDEC" stroke="#E74C3C" filter="url(#sh)"/>
  <text x="730" y="342" text-anchor="middle" fill="#922B21" font-family="Arial" font-size="10" font-weight="bold">Path 1: max_tokens (输出超限)</text>
  <text x="555" y="358" fill="#2C3E50" font-family="Arial" font-size="8">首次: 8K→64K, 不追加截断输出, 直接重试</text>
  <text x="555" y="372" fill="#2C3E50" font-family="Arial" font-size="8">仍截断: 追加截断+continuation prompt, 最多3次重试</text>

  <!-- Path 2 -->
  <rect x="545" y="392" width="348" height="58" rx="4" fill="#FDEBD0" stroke="#F39C12" filter="url(#sh)"/>
  <text x="730" y="408" text-anchor="middle" fill="#7D6608" font-family="Arial" font-size="10" font-weight="bold">Path 2: prompt_too_long (上下文过长)</text>
  <text x="555" y="424" fill="#2C3E50" font-family="Arial" font-size="8">首次: reactive_compact() LLM摘要+保留最近5条</text>
  <text x="555" y="438" fill="#2C3E50" font-family="Arial" font-size="8">仍失败: 不可恢复, 优雅退出 (单条消息超限)</text>

  <!-- Path 3 -->
  <rect x="545" y="458" width="348" height="58" rx="4" fill="#F4ECF7" stroke="#AF7AC5" filter="url(#sh)"/>
  <text x="730" y="474" text-anchor="middle" fill="#6C3483" font-family="Arial" font-size="10" font-weight="bold">Path 3: 429/529 (API限流)</text>
  <text x="555" y="490" fill="#2C3E50" font-family="Arial" font-size="8">指数退避: delay = min(500ms×2^attempt, 32s) + jitter</text>
  <text x="555" y="504" fill="#2C3E50" font-family="Arial" font-size="8">连续3次529→切换FALLBACK_MODEL (避开拥堵端点)</text>

  <!-- RecoveryState -->
  <rect x="545" y="526" width="348" height="50" rx="4" fill="#F8F9FA" stroke="#D5D8DC"/>
  <text x="730" y="542" text-anchor="middle" fill="#2C3E50" font-family="Arial" font-size="10" font-weight="bold">RecoveryState 状态机</text>
  <text x="555" y="558" fill="#7F8C8D" font-family="Arial" font-size="8">has_escalated | has_attempted_reactive_compact | recovery_count | consecutive_529 | current_model</text>

  <!-- Theory badge -->
  <rect x="545" y="586" width="348" height="22" rx="4" fill="#D4E6F1" stroke="#85C1E9"/>
  <text x="730" y="601" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="9" font-style="italic">设计原则: 状态追踪 → 渐进升级 → 最终兜底</text>

  <rect x="545" y="615" width="348" height="20" rx="3" fill="#E8DAEF"/>
  <text x="730" y="629" text-anchor="middle" fill="#6C3483" font-family="Arial" font-size="8">v4→v5: 模块 9→11 | 解决长期知识+鲁棒性问题</text>
</svg>
