<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980B9"/>
    </marker>
    <filter id="sh"><feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#00000012"/></filter>
    <linearGradient id="hd"><stop offset="0%" stop-color="#2C3E50"/><stop offset="100%" stop-color="#34495E"/></linearGradient>
    <linearGradient id="auto"><stop offset="0%" stop-color="#D35400"/><stop offset="100%" stop-color="#A04000"/></linearGradient>
    <linearGradient id="wt"><stop offset="0%" stop-color="#16A085"/><stop offset="100%" stop-color="#0E6655"/></linearGradient>
    <linearGradient id="mcp"><stop offset="0%" stop-color="#8E44AD"/><stop offset="100%" stop-color="#6C3483"/></linearGradient>
  </defs>

  <rect width="960" height="680" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <rect x="0" y="0" width="960" height="42" fill="url(#hd)" rx="8"/>
  <rect x="0" y="21" width="960" height="21" fill="url(#hd)"/>
  <text x="480" y="27" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="16" font-weight="bold">Agent v8 — 完整Claude Code架构 (自主Agent + Worktree隔离 + MCP插件)</text>

  <!-- ===== TOP: main.py ===== -->
  <rect x="10" y="50" width="940" height="170" rx="6" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1.5"/>
  <text x="30" y="70" fill="#34495E" font-family="Arial" font-size="13" font-weight="bold">main.py — 动态工具池 + MCP重组装</text>

  <!-- agent_loop -->
  <rect x="30" y="80" width="900" height="36" rx="5" fill="#EBF5FB" stroke="#85C1E9" filter="url(#sh)"/>
  <text x="480" y="98" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="10" font-weight="bold">agent_loop: 记忆 → 压缩 → LLM (动态工具池: BUILTIN + MCP) → connect_mcp后重建工具池</text>
  <text x="480" y="112" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="7">connect_mcp后 → assemble_tool_pool() → 重建工具池 + 刷新system prompt</text>

  <!-- Tool categories -->
  <text x="30" y="134" fill="#34495E" font-family="Arial" font-size="9" font-weight="bold">工具池 (22+N):</text>
  <rect x="30" y="142" width="180" height="32" rx="4" fill="#D4E6F1"/>
  <text x="120" y="156" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="7" font-weight="bold">核心 (7)</text>
  <text x="120" y="168" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="6">bash/read/write/edit/glob/compact/sub</text>

  <rect x="220" y="142" width="180" height="32" rx="4" fill="#D5F5E3"/>
  <text x="310" y="156" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="7" font-weight="bold">任务 (5)</text>
  <text x="310" y="168" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="6">create/list/get/claim/complete</text>

  <rect x="410" y="142" width="180" height="32" rx="4" fill="#F4ECF7"/>
  <text x="500" y="156" text-anchor="middle" fill="#6C3483" font-family="Arial" font-size="7" font-weight="bold">团队 (6)</text>
  <text x="500" y="168" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="6">spawn/send/inbox/shut/plan/review</text>

  <rect x="600" y="142" width="160" height="32" rx="4" fill="#E8F8F5"/>
  <text x="680" y="156" text-anchor="middle" fill="#0E6655" font-family="Arial" font-size="7" font-weight="bold">Worktree (3)</text>
  <text x="680" y="168" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="6">create/remove/keep</text>

  <rect x="770" y="142" width="160" height="32" rx="4" fill="#FDEBD0"/>
  <text x="850" y="156" text-anchor="middle" fill="#7E5109" font-family="Arial" font-size="7" font-weight="bold">MCP (1+N)</text>
  <text x="850" y="168" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="6">connect_mcp + mcp__*</text>

  <rect x="30" y="180" width="900" height="20" rx="3" fill="#D4EFDF"/>
  <text x="480" y="194" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="8" font-style="italic">从 3个文件(v1) → 15个模块(v8) — 完整复现Claude Code核心架构</text>

  <!-- ===== MIDDLE: Autonomous Agent ===== -->
  <rect x="10" y="228" width="460" height="270" rx="6" fill="#FEF5E7" stroke="#E67E22" stroke-width="1.5"/>
  <rect x="10" y="228" width="460" height="24" rx="6" fill="url(#auto)"/>
  <rect x="10" y="242" width="460" height="10" fill="url(#auto)"/>
  <text x="240" y="245" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="11" font-weight="bold">自主 Agent (Teammate) — WORK/IDLE 生命周期</text>

  <rect x="25" y="258" width="430" height="105" rx="4" fill="#F8F9FA" stroke="#D5D8DC"/>
  <text x="35" y="274" fill="#7E5109" font-family="Arial" font-size="9" font-weight="bold">while True:</text>

  <rect x="35" y="282" width="410" height="20" rx="3" fill="#D4E6F1"/>
  <text x="240" y="296" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="8" font-weight="bold">身份重注入 (if len(messages)≤3: 插入&lt;identity&gt;消息)</text>

  <rect x="35" y="306" width="410" height="20" rx="3" fill="#D5F5E3"/>
  <text x="240" y="320" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="8" font-weight="bold">WORK阶段 (max 10轮): 收件箱检查 → 协议分发 → LLM → 工具执行</text>

  <rect x="35" y="330" width="410" height="20" rx="3" fill="#FDEBD0"/>
  <text x="240" y="344" text-anchor="middle" fill="#7E5109" font-family="Arial" font-size="8" font-weight="bold">IDLE阶段 (60s, 每5s轮询): 收件箱? 任务看板? → auto-claim → WORK</text>

  <!-- Auto-claim mechanism -->
  <rect x="25" y="372" width="430" height="58" rx="4" fill="#FDEDEC" stroke="#E74C3C"/>
  <text x="240" y="388" text-anchor="middle" fill="#922B21" font-family="Arial" font-size="9" font-weight="bold">自动认领机制</text>
  <text x="35" y="404" fill="#2C3E50" font-family="Arial" font-size="8">scan_unclaimed_tasks() 扫描 .tasks/: status=="pending" &amp;&amp; owner为空 &amp;&amp; can_start()==True</text>
  <text x="35" y="420" fill="#2C3E50" font-family="Arial" font-size="8">满足条件 → claim_task() → 注入 &lt;auto-claimed&gt; → WORK</text>

  <!-- Teammate tools -->
  <rect x="25" y="440" width="430" height="50" rx="4" fill="#F8F9FA" stroke="#D5D8DC"/>
  <text x="35" y="456" fill="#7E5109" font-family="Arial" font-size="9" font-weight="bold">队友工具 (8):</text>
  <text x="35" y="472" fill="#2C3E50" font-family="Arial" font-size="8">bash/read/write/send/plan/list_tasks/claim_task/complete_task</text>
  <text x="35" y="486" fill="#7F8C8D" font-family="Arial" font-size="7">claim_task时自动切换到绑定的worktree cwd</text>

  <!-- ===== MIDDLE RIGHT: Worktree ===== -->
  <rect x="490" y="228" width="460" height="270" rx="6" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="1.5"/>
  <rect x="490" y="228" width="460" height="24" rx="6" fill="url(#wt)"/>
  <rect x="490" y="242" width="460" height="10" fill="url(#wt)"/>
  <text x="720" y="245" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="11" font-weight="bold">Worktree隔离 — worktree_isolation.py</text>

  <!-- Directory topology -->
  <rect x="505" y="258" width="430" height="80" rx="4" fill="#F8F9FA" stroke="#D5D8DC"/>
  <text x="515" y="274" fill="#0E6655" font-family="Arial" font-size="9" font-weight="bold">目录拓扑:</text>
  <text x="515" y="290" fill="#2C3E50" font-family="Consolas,monospace" font-size="8">Main repo (/)
  ├── .worktrees/auth/    ← wt/auth分支, Task #1</text>
  <text x="515" y="304" fill="#2C3E50" font-family="Consolas,monospace" font-size="8">├── .worktrees/ui/      ← wt/ui分支, Task #2</text>
  <text x="515" y="318" fill="#2C3E50" font-family="Consolas,monospace" font-size="8">├── .tasks/task_xxx.json (worktree: "auth")</text>
  <text x="515" y="332" fill="#2C3E50" font-family="Consolas,monospace" font-size="8">└── .worktrees/events.jsonl (生命周期审计日志)</text>

  <!-- cwd switch -->
  <rect x="505" y="346" width="430" height="50" rx="4" fill="#D5F5E3" stroke="#82E0AA"/>
  <text x="720" y="362" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="9" font-weight="bold">队友 cwd 切换机制</text>
  <text x="515" y="378" fill="#2C3E50" font-family="Arial" font-size="8">claim_task → wt_ctx["path"]=".worktrees/auth" → bash/read/write均在worktree中执行</text>
  <text x="515" y="392" fill="#2C3E50" font-family="Arial" font-size="8">complete_task → wt_ctx["path"]=None → 回到主仓库</text>

  <!-- Safety -->
  <rect x="505" y="404" width="430" height="85" rx="4" fill="#FDEDEC" stroke="#E74C3C"/>
  <text x="720" y="420" text-anchor="middle" fill="#922B21" font-family="Arial" font-size="9" font-weight="bold">安全机制</text>
  <text x="515" y="438" fill="#2C3E50" font-family="Arial" font-size="8">✓ validate_worktree_name(): 拒绝 "." / ".." / 非法字符</text>
  <text x="515" y="454" fill="#2C3E50" font-family="Arial" font-size="8">✓ remove_worktree(): 检查未提交文件/未推送提交</text>
  <text x="515" y="470" fill="#2C3E50" font-family="Arial" font-size="8">✓ events.jsonl: 记录 create/remove/keep 事件</text>
  <text x="515" y="484" fill="#7F8C8D" font-family="Arial" font-size="7">理论基础: git worktree原生命令，共享.git对象数据库，轻量隔离</text>

  <!-- ===== BOTTOM: MCP ===== -->
  <rect x="10" y="506" width="940" height="165" rx="6" fill="#F4ECF7" stroke="#AF7AC5" stroke-width="1.5"/>
  <rect x="10" y="506" width="940" height="24" rx="6" fill="url(#mcp)"/>
  <rect x="10" y="520" width="940" height="10" fill="url(#mcp)"/>
  <text x="480" y="523" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="11" font-weight="bold">MCP插件系统 — mcp_plugin.py</text>

  <!-- MCP flow -->
  <rect x="30" y="538" width="200" height="40" rx="4" fill="#34495E"/>
  <text x="130" y="554" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="9" font-weight="bold">connect_mcp("docs")</text>
  <text x="130" y="570" text-anchor="middle" fill="#BDC3C7" font-family="Arial" font-size="7">连接MCP服务器</text>
  <line x1="230" y1="558" x2="260" y2="558" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="265" y="538" width="200" height="40" rx="4" fill="#E8DAEF"/>
  <text x="365" y="554" text-anchor="middle" fill="#6C3483" font-family="Arial" font-size="9" font-weight="bold">MCPClient 发现工具</text>
  <text x="365" y="570" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="7">tools/list → register</text>
  <line x1="465" y1="558" x2="495" y2="558" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="500" y="538" width="200" height="40" rx="4" fill="#D4E6F1"/>
  <text x="600" y="554" text-anchor="middle" fill="#1A5276" font-family="Arial" font-size="9" font-weight="bold">assemble_tool_pool()</text>
  <text x="600" y="570" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="7">BUILTIN + mcp__docs__*</text>
  <line x1="700" y1="558" x2="730" y2="558" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="735" y="538" width="195" height="40" rx="4" fill="#D5F5E3"/>
  <text x="832" y="554" text-anchor="middle" fill="#1E8449" font-family="Arial" font-size="9" font-weight="bold">LLM立即可用新工具</text>
  <text x="832" y="570" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="7">mcp__docs__search</text>

  <!-- Naming convention -->
  <rect x="30" y="590" width="900" height="35" rx="4" fill="#F8F9FA" stroke="#D5D8DC"/>
  <text x="480" y="606" text-anchor="middle" fill="#2C3E50" font-family="Arial" font-size="9" font-weight="bold">工具命名: mcp__&lt;normalized_server&gt;__&lt;normalized_tool&gt; — 非[a-zA-Z0-9_-]字符替换为_ (防注入)</text>
  <text x="480" y="620" text-anchor="middle" fill="#7F8C8D" font-family="Arial" font-size="7">闭包陷阱规避: lambda *, c=mcp_client, t=tool_name, **kw: c.call_tool(t, kw)  — 默认参数在定义时绑定当前值</text>

  <!-- Mock servers -->
  <rect x="30" y="634" width="430" height="28" rx="3" fill="#E8F8F5"/>
  <text x="245" y="652" text-anchor="middle" fill="#0E6655" font-family="Arial" font-size="8">Mock: docs (readOnly) → search + get_version</text>
  <rect x="480" y="634" width="430" height="28" rx="3" fill="#FDEBD0"/>
  <text x="695" y="652" text-anchor="middle" fill="#7E5109" font-family="Arial" font-size="8">Mock: deploy (destructive) → trigger + status</text>

  <!-- v8 badge -->
  <rect x="10" y="625" width="150" height="30" rx="3" fill="#E8DAEF"/>
  <text x="85" y="644" text-anchor="middle" fill="#6C3483" font-family="Arial" font-size="8">v7→v8: 3个新子系统</text>
</svg>
